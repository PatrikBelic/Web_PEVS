<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="nav-logo">moje<span>.</span>portfolio</div>
    <div class="nav-links">
        <a href="index.html">Domov</a>
        <a href="about.html">O mne</a>
        <a href="blog.html">Blog</a>
        <a href="gallery.html" class="active">Galeria</a>
        <a href="contact.html">Kontakt</a>
    </div>
</nav>

<div class="page">
    <p class="section-label">Galeria</p>

    <div class="gallery-filter">
        <button class="gf-btn active" onclick="filterGal('all', this)">Vsetky</button>
        <button class="gf-btn" onclick="filterGal('priroda', this)">Priroda</button>
        <button class="gf-btn" onclick="filterGal('mesto', this)">Mesto</button>
        <button class="gf-btn" onclick="filterGal('zvierata', this)">Zvierata</button>
    </div>

    <div class="gal-grid" id="galGrid"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lb">
    <div class="lb-box" id="lbBox"></div>
    <div class="lb-info">
        <h3 id="lbTitle"></h3>
        <p id="lbCat"></p>
    </div>
    <button class="lb-close" onclick="closeLightbox()">Zatvorit</button>
</div>

<script src="script.js"></script>
</body>
</html>
